<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="t d">
  <title id="t">Redaction at the trust boundary</title>
  <desc id="d">A left-to-right data-flow diagram. Four inbound channels on the left carry regulated data: user input, RAG chunks, memory cells, and tool results. Their arrows converge on a detect-and-redact gate positioned on a vertical trust boundary. Only past that gate does data fan out to two downstream stores: the context window that reaches the model, and the trace store that keeps a verbatim copy. Downstream notes mark retention lifecycle on the trace store and tenant isolation on the context and stores.</desc>

  <style><![CDATA[
    :root{
      --ce-bg:#FAFAF7;--ce-surface:#FFFFFF;--ce-ink:#1A1A1A;--ce-ink-muted:#5C5C5C;
      --ce-ink-subtle:#9A9A9A;--ce-border:#D9D9D4;
      --ce-primary:#5B7FBF;--ce-accent:#D98E5F;--ce-success:#5C9E78;
      --ce-warn:#B8895A;--ce-alert:#C66B5E;--ce-neutral-1:#EAEAE4;--ce-neutral-3:#8E8E88;
    }
    @media (prefers-color-scheme:dark){
      :root{
        --ce-bg:#0E0F12;--ce-surface:#16181C;--ce-ink:#F2F2EE;--ce-ink-muted:#B4B4AE;
        --ce-ink-subtle:#6E6E68;--ce-border:#2A2D33;
        --ce-primary:#8BA8E0;--ce-accent:#E8B088;--ce-success:#7FBF9B;
        --ce-warn:#D4B58A;--ce-alert:#D88880;--ce-neutral-1:#1F2229;--ce-neutral-3:#6E6E68;
      }
    }
    .bg{fill:var(--ce-bg);}
    .card{fill:var(--ce-surface);stroke:var(--ce-border);stroke-width:1;}
    .in{fill:var(--ce-surface);stroke:var(--ce-ink);stroke-width:1;}
    .gate{fill:var(--ce-surface);stroke:var(--ce-alert);stroke-width:1.5;}
    .ctx{fill:var(--ce-surface);stroke:var(--ce-primary);stroke-width:1.5;}
    .trace{fill:var(--ce-surface);stroke:var(--ce-accent);stroke-width:1.5;}
    .flow{stroke:var(--ce-ink-muted);stroke-width:1;fill:none;}
    .flowClean{stroke:var(--ce-success);stroke-width:1.5;fill:none;}
    .boundary{stroke:var(--ce-alert);stroke-width:1.5;stroke-dasharray:5 4;fill:none;}
    .tick{stroke:var(--ce-ink-muted);stroke-width:1;fill:none;}
    .title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--ce-ink);}
    .h{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:11px;fill:var(--ce-ink);text-transform:uppercase;letter-spacing:0.06em;}
    .l{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:var(--ce-ink);}
    .s{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--ce-ink-muted);}
    .sub{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:12px;fill:var(--ce-ink-muted);}
    .mono{font-family:'JetBrains Mono',ui-monospace,Consolas,monospace;font-size:10px;fill:var(--ce-ink-muted);}
    .gateL{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:11px;fill:var(--ce-alert);text-transform:uppercase;letter-spacing:0.05em;}
  ]]></style>

  <rect class="bg" width="960" height="360"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--ce-ink-muted)"/>
    </marker>
    <marker id="arrowClean" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--ce-success)"/>
    </marker>
  </defs>

  <text class="title" x="48" y="42">Redact at the boundary</text>
  <text class="sub" x="48" y="62">Regulated data crosses one gate before it reaches the context or the trace store.</text>

  <!-- Column headings -->
  <text class="h" x="48" y="96">Inbound channels</text>
  <text class="h" x="432" y="96" text-anchor="middle">Trust boundary</text>
  <text class="h" x="912" y="96" text-anchor="end">Downstream stores</text>

  <!-- Four inbound channel cards, left column -->
  <g>
    <rect class="in" x="48" y="112" width="176" height="40" rx="6"/>
    <text class="l" x="60" y="130">User input</text>
    <text class="mono" x="60" y="144">contracts · health · IDs</text>
  </g>
  <g>
    <rect class="in" x="48" y="160" width="176" height="40" rx="6"/>
    <text class="l" x="60" y="178">RAG chunks</text>
    <text class="mono" x="60" y="192">tickets · HR · emails</text>
  </g>
  <g>
    <rect class="in" x="48" y="208" width="176" height="40" rx="6"/>
    <text class="l" x="60" y="226">Memory cells</text>
    <text class="mono" x="60" y="240">facts · preferences</text>
  </g>
  <g>
    <rect class="in" x="48" y="256" width="176" height="40" rx="6"/>
    <text class="l" x="60" y="274">Tool results</text>
    <text class="mono" x="60" y="288">systems of record</text>
  </g>

  <!-- Converging flow lines from channels to gate inlet (x 224 -> 372) -->
  <path class="flow" d="M224,132 C300,132 300,190 366,204" marker-end="url(#arrow)"/>
  <path class="flow" d="M224,180 C300,180 320,194 366,208" marker-end="url(#arrow)"/>
  <path class="flow" d="M224,228 C300,228 320,222 366,212" marker-end="url(#arrow)"/>
  <path class="flow" d="M224,276 C300,276 300,224 366,216" marker-end="url(#arrow)"/>

  <!-- Vertical trust boundary line -->
  <line class="boundary" x1="432" y1="104" x2="432" y2="316"/>
  <text class="mono" x="432" y="330" text-anchor="middle">external  |  internal</text>

  <!-- Detect + redact gate, straddling the boundary -->
  <rect class="gate" x="376" y="176" width="112" height="72" rx="8"/>
  <text class="gateL" x="432" y="198" text-anchor="middle">Detect + redact</text>
  <text class="s" x="432" y="216" text-anchor="middle">regex · NER · LLM</text>
  <text class="s" x="432" y="232" text-anchor="middle">&#8594; typed placeholders</text>

  <!-- Clean fan-out from gate to two stores -->
  <path class="flowClean" d="M488,196 C560,196 600,150 664,150" marker-end="url(#arrowClean)"/>
  <path class="flowClean" d="M488,228 C560,228 600,264 664,264" marker-end="url(#arrowClean)"/>

  <!-- Context window store -->
  <g>
    <rect class="ctx" x="664" y="120" width="248" height="60" rx="8"/>
    <text class="h" x="680" y="142" fill="var(--ce-primary)">Context window</text>
    <text class="s" x="680" y="160">Assembled prompt to the model.</text>
    <text class="s" x="680" y="174">Redact only when quality allows.</text>
  </g>

  <!-- Trace store -->
  <g>
    <rect class="trace" x="664" y="234" width="248" height="60" rx="8"/>
    <text class="h" x="680" y="256" fill="var(--ce-accent)">Trace store</text>
    <text class="s" x="680" y="274">Verbatim copy of every prompt.</text>
    <text class="s" x="680" y="288">Redact by policy; log selectively.</text>
  </g>

  <!-- Downstream governance notes -->
  <line class="tick" x1="912" y1="180" x2="936" y2="180"/>
  <line class="tick" x1="936" y1="180" x2="936" y2="234"/>
  <line class="tick" x1="912" y1="234" x2="936" y2="234"/>
  <text class="s" x="788" y="316" text-anchor="middle">Retention lifecycle · tenant isolation fails closed</text>
</svg>
