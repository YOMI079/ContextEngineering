<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="t d">
  <title id="t">The modern agentic workflow as a project layout</title>
  <desc id="d">A repository laid out as an operating system for the agent. On the left, the repo root holds AGENTS.md and CLAUDE.md, the per-project system prompt, and a .claude directory containing four kinds of artefact: skills, sub-agents, hooks, and slash commands. Arrows run from each artefact into the agent loop on the right, which cycles through think, act, and observe. Labels show what each artefact contributes: skills add procedural memory, sub-agents add isolated delegation, hooks add enforcement, and slash commands add shortcuts.</desc>

  <style><![CDATA[
    :root{
      --ce-bg:#FAFAF7;--ce-surface:#FFFFFF;--ce-ink:#1A1A1A;--ce-ink-muted:#5C5C5C;
      --ce-ink-subtle:#9A9A9A;--ce-border:#D9D9D4;
      --ce-primary:#5B7FBF;--ce-accent:#D98E5F;--ce-success:#5C9E78;
      --ce-warn:#B8895A;--ce-alert:#C66B5E;--ce-neutral-1:#EAEAE4;
    }
    @media (prefers-color-scheme:dark){
      :root{
        --ce-bg:#0E0F12;--ce-surface:#16181C;--ce-ink:#F2F2EE;--ce-ink-muted:#B4B4AE;
        --ce-ink-subtle:#6E6E68;--ce-border:#2A2D33;
        --ce-primary:#8BA8E0;--ce-accent:#E8B088;--ce-success:#7FBF9B;
        --ce-warn:#D4B58A;--ce-alert:#D88880;--ce-neutral-1:#1F2229;
      }
    }
    .bg{fill:var(--ce-bg);}
    .card{fill:var(--ce-surface);stroke:var(--ce-border);stroke-width:1;}
    .root{fill:var(--ce-surface);stroke:var(--ce-ink);stroke-width:1.5;}
    .dir{fill:var(--ce-neutral-1);stroke:var(--ce-border);stroke-width:1;}
    .flow{fill:none;stroke:var(--ce-ink-muted);stroke-width:1;}
    .loopring{fill:none;stroke:var(--ce-primary);stroke-width:1.5;}
    .title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--ce-ink);}
    .h{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--ce-ink);text-transform:uppercase;letter-spacing:0.06em;}
    .l{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:var(--ce-ink);}
    .s{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--ce-ink-muted);}
    .sub{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:12px;fill:var(--ce-ink-muted);}
    .mono{font-family:'JetBrains Mono',ui-monospace,Consolas,monospace;font-size:12px;fill:var(--ce-ink);}
    .monos{font-family:'JetBrains Mono',ui-monospace,Consolas,monospace;font-size:10px;fill:var(--ce-ink-muted);}
    .loopt{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:var(--ce-primary);}
    .chip{stroke-width:1;}
  ]]></style>

  <rect class="bg" width="960" height="360"/>
  <text class="title" x="48" y="44">The repo is the agent's operating system</text>
  <text class="sub" x="48" y="64">AGENTS.md sets the prompt; .claude/ holds skills, sub-agents, hooks, and slash commands that feed the loop.</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ce-ink-muted)"/>
    </marker>
  </defs>

  <!-- ============ LEFT: project layout ============ -->
  <!-- repo root card -->
  <rect class="root" x="48" y="92" width="230" height="52" rx="8"/>
  <text class="h" x="64" y="114">Repo root</text>
  <rect class="chip" x="150" y="100" width="118" height="20" rx="4" fill="var(--ce-neutral-1)" stroke="var(--ce-border)"/>
  <text class="monos" x="160" y="114">AGENTS.md · CLAUDE.md</text>
  <text class="s" x="64" y="134">the per-project system prompt</text>

  <!-- .claude directory container -->
  <rect class="dir" x="48" y="158" width="360" height="170" rx="8"/>
  <rect class="chip" x="64" y="150" width="86" height="18" rx="4" fill="var(--ce-surface)" stroke="var(--ce-border)"/>
  <text class="monos" x="72" y="163">.claude/</text>

  <!-- four artefact rows, colour + shape paired with label -->
  <!-- skills -->
  <g>
    <rect class="card" x="66" y="176" width="324" height="30" rx="6"/>
    <rect x="66" y="176" width="5" height="30" rx="2" fill="var(--ce-primary)"/>
    <circle cx="86" cy="191" r="5" fill="var(--ce-primary)"/>
    <text class="l" x="100" y="195">skills/</text>
    <text class="s" x="152" y="195">procedural memory · one concern each</text>
  </g>
  <!-- sub-agents -->
  <g>
    <rect class="card" x="66" y="212" width="324" height="30" rx="6"/>
    <rect x="66" y="212" width="5" height="30" rx="2" fill="var(--ce-accent)"/>
    <path d="M81 222 h10 v10 h-10 z M89 214 h10 v10 h-10 z" fill="none" stroke="var(--ce-accent)" stroke-width="1.5"/>
    <text class="l" x="100" y="231">agents/</text>
    <text class="s" x="152" y="231">isolated delegation with a tool budget</text>
  </g>
  <!-- hooks -->
  <g>
    <rect class="card" x="66" y="248" width="324" height="30" rx="6"/>
    <rect x="66" y="248" width="5" height="30" rx="2" fill="var(--ce-alert)"/>
    <path d="M82 259 h8 v8 h-8 z" fill="var(--ce-alert)"/>
    <text class="l" x="100" y="267">hooks/</text>
    <text class="s" x="152" y="267">enforcement: format, test, block</text>
  </g>
  <!-- slash commands -->
  <g>
    <rect class="card" x="66" y="284" width="324" height="30" rx="6"/>
    <rect x="66" y="284" width="5" height="30" rx="2" fill="var(--ce-success)"/>
    <path d="M84 294 l-4 12 M92 294 l-4 12" stroke="var(--ce-success)" stroke-width="1.5" fill="none"/>
    <text class="l" x="100" y="303">commands/</text>
    <text class="s" x="152" y="303">slash shortcuts for repeated tasks</text>
  </g>

  <!-- ============ MIDDLE: flow arrows ============ -->
  <path class="flow" d="M278 118 C 460 118, 460 150, 632 150" marker-end="url(#arrow)"/>
  <path class="flow" d="M390 191 C 500 191, 560 176, 632 178" marker-end="url(#arrow)"/>
  <path class="flow" d="M390 227 C 500 227, 560 210, 632 208" marker-end="url(#arrow)"/>
  <path class="flow" d="M390 263 C 520 263, 580 248, 632 236" marker-end="url(#arrow)"/>
  <path class="flow" d="M390 299 C 500 299, 560 280, 632 264" marker-end="url(#arrow)"/>
  <text class="s" x="470" y="112">loads at start</text>
  <text class="s" x="470" y="330" text-anchor="middle">each artefact feeds the running loop</text>

  <!-- ============ RIGHT: the agent loop ============ -->
  <rect class="card" x="632" y="150" width="280" height="164" rx="10"/>
  <text class="h" x="652" y="176">The agent loop</text>

  <!-- loop ring with three stages -->
  <g transform="translate(772,246)">
    <circle class="loopring" r="52"/>
    <!-- arrowheads suggesting direction -->
    <path d="M52 -6 L52 6 M46 0 L58 0" stroke="var(--ce-primary)" stroke-width="1.5" fill="none" transform="rotate(90)"/>
    <!-- three stage nodes -->
    <g>
      <circle cx="0" cy="-52" r="20" fill="var(--ce-surface)" stroke="var(--ce-primary)" stroke-width="1.5"/>
      <text class="loopt" x="0" y="-48" text-anchor="middle">think</text>
    </g>
    <g>
      <circle cx="45" cy="26" r="20" fill="var(--ce-surface)" stroke="var(--ce-primary)" stroke-width="1.5"/>
      <text class="loopt" x="45" y="30" text-anchor="middle">act</text>
    </g>
    <g>
      <circle cx="-45" cy="26" r="20" fill="var(--ce-surface)" stroke="var(--ce-primary)" stroke-width="1.5"/>
      <text class="loopt" x="-45" y="30" text-anchor="middle">observe</text>
    </g>
  </g>
  <text class="mono" x="652" y="200">while not done:</text>
  <text class="monos" x="652" y="218">think → act → observe → replan</text>
</svg>
