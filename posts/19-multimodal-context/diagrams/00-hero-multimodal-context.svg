<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="t d">
  <title id="t">How an image enters the context window</title>
  <desc id="d">A page image on the left is tiled into a grid of patches; those patches are encoded into a block of image tokens that slots into the six-layer context stack alongside system, tools, memory, retrieval, and history, sharing one budget with text. Below, a branch shows the two routes a PDF page can take: pass the pixels to a vision model, or run OCR to extract text; both routes converge at a single retrieval step.</desc>

  <style><![CDATA[
    :root{
      --ce-bg:#FAFAF7;--ce-surface:#FFFFFF;--ce-ink:#1A1A1A;--ce-ink-muted:#5C5C5C;
      --ce-ink-subtle:#9A9A9A;--ce-border:#D9D9D4;
      --ce-primary:#5B7FBF;--ce-accent:#D98E5F;--ce-success:#5C9E78;
      --ce-warn:#B8895A;--ce-alert:#C66B5E;--ce-neutral-1:#EAEAE4;--ce-neutral-3:#8E8E88;
      --ce-grid:rgba(26,26,26,0.06);
    }
    @media (prefers-color-scheme:dark){
      :root{
        --ce-bg:#0E0F12;--ce-surface:#16181C;--ce-ink:#F2F2EE;--ce-ink-muted:#B4B4AE;
        --ce-ink-subtle:#6E6E68;--ce-border:#2A2D33;
        --ce-primary:#8BA8E0;--ce-accent:#E8B088;--ce-success:#7FBF9B;
        --ce-warn:#D4B58A;--ce-alert:#D88880;--ce-neutral-1:#1F2229;--ce-neutral-3:#6E6E68;
        --ce-grid:rgba(241,238,232,0.08);
      }
    }
    .bg{fill:var(--ce-bg);}
    .card{fill:var(--ce-surface);stroke:var(--ce-border);stroke-width:1;}
    .page{fill:var(--ce-surface);stroke:var(--ce-ink);stroke-width:1.5;}
    .tile{fill:none;stroke:var(--ce-primary);stroke-width:1;}
    .tokblk{fill:var(--ce-primary);}
    .grid{stroke:var(--ce-grid);stroke-width:0.75;}
    .flow{stroke:var(--ce-ink);stroke-width:1.5;fill:none;}
    .flow2{stroke:var(--ce-ink-muted);stroke-width:1;fill:none;stroke-dasharray:4 3;}
    .title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--ce-ink);}
    .sub{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:12px;fill:var(--ce-ink-muted);}
    .h{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:11px;fill:var(--ce-ink);text-transform:uppercase;letter-spacing:0.06em;}
    .l{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:var(--ce-ink);}
    .s{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--ce-ink-muted);}
    .lab{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:11px;fill:#FFFFFF;}
    .layerlab{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:11px;fill:var(--ce-ink);}
    .mono{font-family:'JetBrains Mono',ui-monospace,Consolas,monospace;font-size:10.5px;fill:var(--ce-ink-muted);}
  ]]></style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ce-ink)"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--ce-ink-muted)"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="360"/>
  <text class="title" x="48" y="42">An image enters the same window as text</text>
  <text class="sub" x="48" y="61">A page tiles into patches, patches become image tokens, and those tokens share the six-layer stack and its budget.</text>

  <!-- ============ TOP ROW: page -> tiles -> image tokens -> six-layer stack ============ -->

  <!-- 1. Page image -->
  <text class="h" x="48" y="92">Page image</text>
  <rect class="page" x="48" y="100" width="86" height="112" rx="4"/>
  <line class="grid" x1="58" y1="118" x2="124" y2="118"/>
  <line class="grid" x1="58" y1="130" x2="124" y2="130"/>
  <line class="grid" x1="58" y1="142" x2="112" y2="142"/>
  <line class="grid" x1="58" y1="160" x2="124" y2="160"/>
  <line class="grid" x1="58" y1="172" x2="124" y2="172"/>
  <line class="grid" x1="58" y1="184" x2="104" y2="184"/>
  <text class="s" x="91" y="230" text-anchor="middle">a rendered page</text>

  <line class="flow" x1="140" y1="156" x2="176" y2="156" marker-end="url(#arrow)"/>
  <text class="mono" x="158" y="148" text-anchor="middle">tile</text>

  <!-- 2. Grid of tiles -->
  <text class="h" x="184" y="92">Tiled patches</text>
  <g>
    <rect class="page" x="184" y="100" width="112" height="112" rx="4"/>
    <!-- 4x4 grid of tiles -->
    <line class="tile" x1="212" y1="100" x2="212" y2="212"/>
    <line class="tile" x1="240" y1="100" x2="240" y2="212"/>
    <line class="tile" x1="268" y1="100" x2="268" y2="212"/>
    <line class="tile" x1="184" y1="128" x2="296" y2="128"/>
    <line class="tile" x1="184" y1="156" x2="296" y2="156"/>
    <line class="tile" x1="184" y1="184" x2="296" y2="184"/>
  </g>
  <text class="s" x="240" y="230" text-anchor="middle">grid of fixed tiles</text>

  <line class="flow" x1="302" y1="156" x2="338" y2="156" marker-end="url(#arrow)"/>
  <text class="mono" x="320" y="148" text-anchor="middle">encode</text>

  <!-- 3. Image tokens block -->
  <text class="h" x="346" y="92">Image tokens</text>
  <g>
    <!-- block of small token cells 4 cols x 6 rows -->
    <rect class="tokblk" x="346" y="100" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="367" y="100" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="388" y="100" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="409" y="100" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="346" y="119" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="367" y="119" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="388" y="119" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="409" y="119" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="346" y="138" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="367" y="138" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="388" y="138" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="409" y="138" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="346" y="157" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="367" y="157" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="388" y="157" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="409" y="157" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="346" y="176" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="367" y="176" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="388" y="176" width="18" height="16" rx="2"/>
    <rect class="tokblk" x="409" y="176" width="18" height="16" rx="2"/>
  </g>
  <text class="s" x="386" y="208" text-anchor="middle">N tokens</text>
  <text class="mono" x="386" y="228" text-anchor="middle">more tiles = more tokens</text>

  <line class="flow" x1="432" y1="156" x2="470" y2="156" marker-end="url(#arrow)"/>
  <text class="mono" x="451" y="148" text-anchor="middle">slot in</text>

  <!-- 4. Six-layer stack -->
  <text class="h" x="482" y="92">Six-layer context stack · one shared budget</text>
  <g>
    <!-- stack of 6 layers, image-token layer highlighted -->
    <rect x="482" y="100" width="196" height="18" rx="3" fill="var(--ce-surface)" stroke="var(--ce-border)"/>
    <text class="layerlab" x="490" y="113">01 · System prompt</text>

    <rect x="482" y="120" width="196" height="18" rx="3" fill="var(--ce-surface)" stroke="var(--ce-border)"/>
    <text class="layerlab" x="490" y="133">02 · Tools / MCP</text>

    <rect x="482" y="140" width="196" height="18" rx="3" fill="var(--ce-surface)" stroke="var(--ce-border)"/>
    <text class="layerlab" x="490" y="153">03 · Memory &amp; state</text>

    <!-- highlighted image-token layer -->
    <rect x="482" y="160" width="196" height="18" rx="3" fill="var(--ce-primary)" stroke="var(--ce-primary)"/>
    <text class="lab" x="490" y="173">04 · Image tokens (RAG)</text>

    <rect x="482" y="180" width="196" height="18" rx="3" fill="var(--ce-surface)" stroke="var(--ce-border)"/>
    <text class="layerlab" x="490" y="193">05 · History</text>

    <rect x="482" y="200" width="196" height="18" rx="3" fill="var(--ce-surface)" stroke="var(--ce-border)"/>
    <text class="layerlab" x="490" y="213">06 · User instruction</text>
  </g>
  <text class="s" x="482" y="234">Pixels are billed and budgeted exactly like text tokens.</text>

  <!-- vertical divider -->
  <line class="grid" x1="700" y1="88" x2="700" y2="234"/>

  <!-- Right rail: budget note -->
  <rect class="card" x="720" y="96" width="192" height="140" rx="8"/>
  <text class="h" x="736" y="120">Budget rule</text>
  <text class="s" x="736" y="142">Halving each side of an</text>
  <text class="s" x="736" y="158">image roughly quarters</text>
  <text class="s" x="736" y="174">its tiles, and so its tokens.</text>
  <text class="l" x="736" y="200">Resize on purpose.</text>
  <text class="s" x="736" y="218">Send the lowest resolution</text>
  <text class="s" x="736" y="232">the task actually needs.</text>

  <!-- ============ BOTTOM ROW: PDF page routing branch ============ -->
  <line class="grid" x1="48" y1="256" x2="912" y2="256"/>
  <text class="h" x="48" y="280">One PDF page, two routes</text>

  <!-- PDF page source -->
  <rect class="page" x="48" y="292" width="52" height="52" rx="4"/>
  <text class="mono" x="74" y="322" text-anchor="middle">PDF</text>

  <!-- branch point -->
  <line class="flow" x1="100" y1="318" x2="132" y2="318"/>
  <!-- up to pixels route -->
  <path class="flow" d="M132 318 L132 300 L176 300" marker-end="url(#arrow)"/>
  <!-- down to OCR route -->
  <path class="flow" d="M132 318 L132 336 L176 336" marker-end="url(#arrow)"/>

  <!-- Route A: pass pixels (vision) -->
  <rect x="180" y="288" width="200" height="26" rx="6" fill="var(--ce-success)"/>
  <text class="lab" x="194" y="305">Pass pixels · vision model</text>
  <text class="s" x="388" y="305">layout, tables, figures preserved</text>

  <!-- Route B: OCR to text -->
  <rect x="180" y="324" width="200" height="26" rx="6" fill="var(--ce-accent)"/>
  <text class="lab" x="194" y="341">OCR to text · text pipeline</text>
  <text class="s" x="388" y="341">far fewer tokens; OCR can err</text>

  <!-- converge at retrieval -->
  <path class="flow" d="M636 301 L672 301 L672 318 L708 318" marker-end="url(#arrow)"/>
  <path class="flow" d="M636 337 L672 337 L672 318" />
  <!-- leader lines from route ends to the merge -->
  <line class="flow2" x1="614" y1="301" x2="636" y2="301" marker-end="url(#arrow2)"/>
  <line class="flow2" x1="614" y1="337" x2="636" y2="337" marker-end="url(#arrow2)"/>

  <rect x="710" y="300" width="150" height="36" rx="8" fill="var(--ce-surface)" stroke="var(--ce-ink)" stroke-width="1.5"/>
  <text class="l" x="785" y="317" text-anchor="middle">Retrieval</text>
  <text class="s" x="785" y="330" text-anchor="middle">both routes meet here</text>
</svg>
