<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" role="img" aria-labelledby="t d">
  <title id="t">Five context failure modes mapped to layers</title>
  <desc id="d">A five-by-three matrix mapping the five failure modes (distraction, confusion, conflict, lost-in-the-middle, tool-storm) to the layer most often responsible (system, tools, memory, RAG, history) and to the first-fix to apply.</desc>
  <style><![CDATA[
    :root{--bg:#FAFAF7;--ink:#1A1A1A;--muted:#5C5C5C;--primary:#5B7FBF;--accent:#D98E5F;--success:#5C9E78;--warn:#B8895A;--alert:#C66B5E;--surface:#FFFFFF;}
    @media (prefers-color-scheme:dark){:root{--bg:#161512;--ink:#F1EEE8;--muted:#A6A29B;--primary:#8BA8E0;--accent:#E8B088;--success:#7FBF9B;--warn:#D4B58A;--alert:#D88880;--surface:#1E1D1A;}}
    .bg{fill:var(--bg);}
    .row{fill:var(--surface);stroke:var(--ink);stroke-width:1;}
    .name{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:13px;fill:var(--ink);}
    .l{font-family:Inter,system-ui,sans-serif;font-weight:500;font-size:12px;fill:var(--ink);}
    .s{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--muted);}
    .pill{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:11px;fill:#FFFFFF;}
    .h{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--ink);text-transform:uppercase;letter-spacing:0.06em;}
    .title{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:18px;fill:var(--ink);}
  ]]></style>
  <rect class="bg" width="820" height="380"/>
  <text class="title" x="32" y="32">Five failure modes, layer source, first-fix</text>

  <!-- Header -->
  <text class="h" x="40"  y="62">Mode</text>
  <text class="h" x="220" y="62">Symptom</text>
  <text class="h" x="500" y="62">Layer</text>
  <text class="h" x="610" y="62">First-fix</text>

  <!-- Row 1: Distraction -->
  <rect class="row" x="32" y="72" width="756" height="48" rx="6"/>
  <rect x="40"  y="84" width="124" height="22" rx="11" fill="var(--accent)"/>
  <text class="pill" x="102" y="100" text-anchor="middle">Distraction</text>
  <text class="l" x="220" y="100">fluent answer, off topic</text>
  <text class="l" x="500" y="100">RAG / system</text>
  <text class="l" x="610" y="100">tighten Select; add reranker</text>

  <!-- Row 2: Confusion -->
  <rect class="row" x="32" y="124" width="756" height="48" rx="6"/>
  <rect x="40" y="136" width="124" height="22" rx="11" fill="var(--warn)"/>
  <text class="pill" x="102" y="152" text-anchor="middle">Confusion</text>
  <text class="l" x="220" y="152">right info present, wrong choice</text>
  <text class="l" x="500" y="152">system / tools</text>
  <text class="l" x="610" y="152">explicit rules; examples</text>

  <!-- Row 3: Conflict -->
  <rect class="row" x="32" y="176" width="756" height="48" rx="6"/>
  <rect x="40" y="188" width="124" height="22" rx="11" fill="var(--alert)"/>
  <text class="pill" x="102" y="204" text-anchor="middle">Conflict</text>
  <text class="l" x="220" y="204">internally contradictory answer</text>
  <text class="l" x="500" y="204">memory / RAG</text>
  <text class="l" x="610" y="204">provenance + precedence rule</text>

  <!-- Row 4: Lost in middle -->
  <rect class="row" x="32" y="228" width="756" height="48" rx="6"/>
  <rect x="40" y="240" width="124" height="22" rx="11" fill="var(--primary)"/>
  <text class="pill" x="102" y="256" text-anchor="middle">Lost-in-middle</text>
  <text class="l" x="220" y="256">long context, middle ignored</text>
  <text class="l" x="500" y="256">RAG / history</text>
  <text class="l" x="610" y="256">bookend packing</text>

  <!-- Row 5: Tool storm -->
  <rect class="row" x="32" y="280" width="756" height="48" rx="6"/>
  <rect x="40" y="292" width="124" height="22" rx="11" fill="var(--success)"/>
  <text class="pill" x="102" y="308" text-anchor="middle">Tool-storm</text>
  <text class="l" x="220" y="308">tool calls without progress</text>
  <text class="l" x="500" y="308">tools (layer 02)</text>
  <text class="l" x="610" y="308">trim catalog; cap loop</text>

  <text class="s" x="32" y="354">Walk these five in order on every bug report. The first yes is almost always the right one. The remaining 5% are model or systems bugs.</text>
</svg>
