<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-labelledby="t d">
  <title id="t">Effective attention as a function of position in a long prompt</title>
  <desc id="d">A bar histogram showing high effective attention at the start and end of a long prompt and a marked dip across the middle. The shape mirrors the lost-in-the-middle U-curve and motivates the placement heuristic of front-load stable content, end-load the user question, and compress the middle.</desc>
  <style><![CDATA[
    :root{--bg:#FAFAF7;--ink:#1A1A1A;--muted:#5C5C5C;--primary:#5B7FBF;--accent:#D98E5F;--alert:#C66B5E;--grid:rgba(26,26,26,0.06);}
    @media (prefers-color-scheme:dark){:root{--bg:#161512;--ink:#F1EEE8;--muted:#A6A29B;--primary:#8BA8E0;--accent:#E8B088;--alert:#D88880;--grid:rgba(241,238,232,0.08);}}
    .bg{fill:var(--bg);}
    .ax{stroke:var(--muted);stroke-width:1;}
    .grid{stroke:var(--grid);stroke-width:0.75;}
    .b-high{fill:var(--primary);fill-opacity:0.85;}
    .b-mid{fill:var(--alert);fill-opacity:0.55;}
    .b-end{fill:var(--accent);fill-opacity:0.85;}
    .title{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:18px;fill:var(--ink);}
    .l{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:var(--ink);}
    .s{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--muted);}
  ]]></style>
  <rect class="bg" width="800" height="320"/>
  <text class="title" x="32" y="32">Where in the prompt does the model actually look?</text>

  <!-- axis -->
  <line class="ax" x1="60" y1="240" x2="760" y2="240"/>
  <line class="ax" x1="60" y1="80"  x2="60"  y2="240"/>
  <!-- gridlines -->
  <line class="grid" x1="60" y1="200" x2="760" y2="200"/>
  <line class="grid" x1="60" y1="160" x2="760" y2="160"/>
  <line class="grid" x1="60" y1="120" x2="760" y2="120"/>
  <line class="grid" x1="60" y1="80"  x2="760" y2="80" />

  <!-- bars: 14 buckets across positions -->
  <g>
    <rect class="b-high" x="68"  y="86"  width="40" height="154"/>
    <rect class="b-high" x="116" y="100" width="40" height="140"/>
    <rect class="b-high" x="164" y="118" width="40" height="122"/>
    <rect class="b-mid"  x="212" y="146" width="40" height="94"/>
    <rect class="b-mid"  x="260" y="170" width="40" height="70"/>
    <rect class="b-mid"  x="308" y="186" width="40" height="54"/>
    <rect class="b-mid"  x="356" y="194" width="40" height="46"/>
    <rect class="b-mid"  x="404" y="194" width="40" height="46"/>
    <rect class="b-mid"  x="452" y="186" width="40" height="54"/>
    <rect class="b-mid"  x="500" y="170" width="40" height="70"/>
    <rect class="b-mid"  x="548" y="148" width="40" height="92"/>
    <rect class="b-end"  x="596" y="120" width="40" height="120"/>
    <rect class="b-end"  x="644" y="100" width="40" height="140"/>
    <rect class="b-end"  x="692" y="86"  width="40" height="154"/>
  </g>

  <!-- x labels -->
  <text class="s" x="60" y="258">start</text>
  <text class="s" x="380" y="258" text-anchor="middle">middle of prompt</text>
  <text class="s" x="760" y="258" text-anchor="end">end</text>

  <!-- annotations -->
  <text class="l" x="120" y="74" text-anchor="middle">cached prefix</text>
  <text class="s" x="120" y="276" text-anchor="middle">system · tools</text>
  <text class="l" x="380" y="74" text-anchor="middle">lost in the middle</text>
  <text class="s" x="380" y="276" text-anchor="middle">long retrieved docs · history</text>
  <text class="l" x="688" y="74" text-anchor="middle">recency window</text>
  <text class="s" x="688" y="276" text-anchor="middle">memory · user question</text>

  <!-- y label -->
  <text class="s" x="20" y="160" transform="rotate(-90 20 160)" text-anchor="middle">effective attention</text>

  <text class="s" x="60" y="306">Schematic. Exact dip varies by model, training regime, and absolute prompt length; the U-shape is robust.</text>
</svg>
